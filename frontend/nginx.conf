server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: any path not matching a static file serves
    # index.html so client-side routing (if added later) doesn't 404
    # on refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reasonable caching for hashed build assets; index.html itself is
    # excluded since it must always be revalidated.
    location ~* \.(?:css|js|woff2?|svg|png|jpg|jpeg|gif|ico)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public";
    }
}